services:
  hr-sot:
    build: .
    image: demo-hr-sot:local
    # Container name is overridable so a dev and a prod stack can coexist on the
    # same Docker host without a name collision (container names are global).
    container_name: ${HRSOT_CONTAINER_NAME:-demo-hr-sot}
    ports:
      - "${HRSOT_HOST_PORT:-8000}:8000"
    volumes:
      # Named volume (not a host bind mount): a fresh named volume inherits the
      # image's /data ownership (uid/gid 1000, the non-root `hrsot` user), so the
      # container can write session_secret/hrsot.db. A bind mount would be created
      # root-owned on the host and break with PermissionError.
      - hrsot-data:/data
    environment:
      HRSOT_LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Streamable-HTTP MCP server. A separate, stateless container that proxies MCP
  # tool calls to hr-sot's REST API, forwarding each caller's own API token. It
  # holds no data and no credentials of its own.
  hr-mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    image: demo-hr-mcp:local
    container_name: ${HRMCP_CONTAINER_NAME:-demo-hr-mcp}
    depends_on:
      hr-sot:
        # Wait until the app is healthy so early tool calls don't hit a cold API.
        condition: service_healthy
    # The container always listens on 8100 internally; HRMCP_HOST_PORT sets the
    # inbound (published) port. Set distinct HRMCP_HOST_PORT values to run dev
    # and prod MCP servers on one host, e.g. HRMCP_HOST_PORT=9026 -> 9026:8100.
    ports:
      - "${HRMCP_HOST_PORT:-8100}:8100"
    volumes:
      # Read-only: the MCP server reads its token files from the app's data volume
      # (mcp_api_key for outbound, mcp_gateway_tokens.json for inbound gateway
      # auth), both written by the app. Same uid (1000) so the 0600 files are
      # readable. It never writes here.
      - hrsot-data:/data:ro
    environment:
      # Reaches the app by its compose service name on the project network, so
      # this stays correct even if HRSOT_CONTAINER_NAME is overridden.
      HRMCP_HR_API_BASE_URL: http://hr-sot:8000
      HRMCP_DATA_DIR: /data
      HRMCP_PATH: ${HRMCP_PATH:-/mcp}
      HRMCP_LOG_LEVEL: INFO
    restart: unless-stopped

volumes:
  hrsot-data:
