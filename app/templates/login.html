<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Demo HR Source of Truth</title>
  <link rel="preconnect" href="https://fonts.cdnfonts.com" />
  <link href="https://fonts.cdnfonts.com/css/geist" rel="stylesheet" />
  <link href="https://fonts.cdnfonts.com/css/geist-mono" rel="stylesheet" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>

  {% if flashes %}
  <div class="flashes">
    {% for f in flashes %}
    <div class="flash flash--{{ f.level }}">{{ f.message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-card__brand">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--primary);">
          <rect x="3" y="6" width="18" height="15" rx="2" />
          <rect x="9" y="3" width="6" height="4" rx="1" />
          <path d="M3 13h18" />
          <circle cx="12" cy="17" r="1.5" />
        </svg>
        <h1 class="auth-card__title">Demo HR · Source of Truth</h1>
        <p class="auth-card__subtitle">Sign in to continue</p>
      </div>

      {% if error %}
      <div class="inline-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/ui/login">
        <div class="form-row">
          <label class="label" for="username">Username</label>
          <input type="text" id="username" name="username" class="input" autofocus required autocomplete="username" />
        </div>
        <div class="form-row">
          <label class="label" for="password">Password</label>
          <input type="password" id="password" name="password" class="input" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn--primary" style="width: 100%;">Sign in</button>
      </form>

      <div style="margin-top: var(--s-8); text-align: center;">
        <div class="auth-card__mark">POC · non-production</div>
      </div>
    </div>
  </div>

</body>
</html>
